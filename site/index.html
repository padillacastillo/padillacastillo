<!DOCTYPE html>
<html lang="en">
<head>

<style>
  @font-face {
    font-family: 'IBM Plex Mono';
    src: local('IBM Plex Mono');
  }

  :root {
    --bg: #0c0d0e;
    --fg: #e6e6e6;
    --muted: #8a8a8a;
    --faint: #5a5a5a;
    --accent: #8ab4f8;
    --error: #c97b7b;
    --term-user: #5fd75f;
    --term-path: #6cb6ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    font-family: 'IBM Plex Mono', 'JetBrains Mono', Consolas, monospace;
    overflow: hidden;
  }

  #screen {
    height: 100%;
    padding: 28px 32px;
    color: var(--fg);
    font-size: 14.5px;
    line-height: 1.6;
    overflow-y: auto;
  }

  #screen::-webkit-scrollbar { width: 0; }

  .boot {
    color: var(--faint);
    white-space: pre-wrap;
  }

  @keyframes screenFlicker {
    0%   { opacity: 0; }
    4%   { opacity: 1; }
    6%   { opacity: 0.2; }
    9%   { opacity: 1; }
    12%  { opacity: 0.4; }
    16%  { opacity: 1; }
    35%  { opacity: 0.7; }
    40%  { opacity: 1; }
    100% { opacity: 1; }
  }

  #screen.boot-in {
    animation: screenFlicker 1s ease-out;
  }

  .prompt-line {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
  }

  .prompt {
    color: var(--accent);
    white-space: nowrap;
    font-weight: 600;
    margin-right: 8px;
  }

  .p-user { color: var(--term-user); }
  .p-sep, .p-dollar { color: var(--fg); }
  .p-path { color: var(--term-path); }

  .history-cmd {
    color: var(--fg);
  }

  .output {
    margin: 4px 0 16px 0;
    white-space: pre-wrap;
  }

  .output a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: var(--faint);
  }

  .output a:hover {
    text-decoration-color: var(--accent);
  }

  .label { color: var(--muted); }
  .dim { color: var(--error); }

  #live-line {
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #live-line.visible {
    opacity: 1;
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: var(--accent);
    vertical-align: text-bottom;
  }

  .cursor.blinking {
    animation: blink 1s step-start infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .hidden-input {
    position: fixed;
    top: 0;
    left: 0;
    width: 1px;
    height: 1px;
    padding: 0;
    border: none;
    outline: none;
    background: transparent;
    color: transparent;
    caret-color: transparent;
    font-size: 16px; /* stops iOS Safari from auto-zooming on focus */
    opacity: 0;
  }

  .table-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 4px 12px;
  }

  @media (max-width: 560px) {
    #screen { padding: 18px 16px; font-size: 13px; }
    .table-row { grid-template-columns: 90px 1fr; }
  }
</style>
</head>
<body>
<div id="screen" tabindex="0">
  <div class="boot" id="boot"></div>
  <div id="history"></div>
  <div class="prompt-line" id="live-line">
    <span class="prompt" id="live-prompt"></span>
    <span id="typed-text"></span><span class="cursor blinking" id="cursor"></span>
  </div>
</div>
<input id="hidden-input" class="hidden-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text">

<script>
const screen = document.getElementById('screen');
const history = document.getElementById('history');
const typedText = document.getElementById('typed-text');
const boot = document.getElementById('boot');
const liveLine = document.getElementById('live-line');
const cursorEl = document.getElementById('cursor');
const hiddenInput = document.getElementById('hidden-input');
const livePrompt = document.getElementById('live-prompt');

const PROMPT_HTML = `<span class="p-user">guest@padillacastillo</span><span class="p-sep">:</span><span class="p-path">~</span><span class="p-dollar">$</span>`;

const motd = `type 'help' to see available commands`;

const commands = {
  help: () =>
`whoami
projects
stack
stats
contact
clear`,

  whoami: () =>
`Cristian Padilla Castillo — CS student, expected 2027.
I build systems around cloud infrastructure and automation —
tools that remove a step someone used to do by hand.
Based in Los Angeles.`,

  projects: () =>
`<div class="table-row"><span class="label">01</span><span>This site — S3 + CloudFront + API Gateway + Lambda
   + DynamoDB, deployed via GitHub Actions/OIDC.
   <a href="https://github.com/padillacastillo/padillacastillo" target="_blank" rel="noopener">view repo →</a></span></div>

<div class="table-row"><span class="label">02</span><span>CPC Mobile Notary fee calculator — planned: a booking
   and fee-calculator tool for a mobile notary business I run.</span></div>`,

  stack: () =>
`AWS: S3 · CloudFront · API Gateway · Lambda · DynamoDB · SES · Route 53
IaC: Terraform · GitHub Actions (OIDC)
Languages: Python · JavaScript
Currently studying: AWS SAA-C03`,

  stats: () => {
    fetchVisitorCount();
    return `checking visitor count…`;
  },

  clear: () => null,

  contact: () => {
    mode = 'name';
    updatePrompt();
    return `sure — what's your name?`;
  },

  sudo: () => `nice try. permission denied.`,
};

const CONTACT_API_URL = "https://rc8s3wfo3i.execute-api.us-east-1.amazonaws.com/contact";
const VISITOR_COUNTER_API_URL = "https://8tg1s8r8f0.execute-api.us-east-1.amazonaws.com/count";

let inputBuffer = "";
let cmdHistory = [];
let histIndex = -1;
let mode = null; // null | 'name' | 'email' | 'message'
let contactData = {};
let blinkTimer = null;

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function isValidEmail(str) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str);
}

function scrollToBottom() {
  screen.scrollTop = screen.scrollHeight;
}

function holdCursorSolid() {
  cursorEl.classList.remove('blinking');
  clearTimeout(blinkTimer);
  blinkTimer = setTimeout(() => cursorEl.classList.add('blinking'), 1000);
}

function updatePrompt() {
  if (mode === 'name') {
    livePrompt.textContent = "your name >";
  } else if (mode === 'email') {
    livePrompt.textContent = "your email >";
  } else if (mode === 'message') {
    livePrompt.textContent = "your message >";
  } else {
    livePrompt.innerHTML = PROMPT_HTML;
  }
}

function printOutput(html) {
  const outDiv = document.createElement('div');
  outDiv.className = 'output';
  outDiv.innerHTML = html;
  history.appendChild(outDiv);
  scrollToBottom();
}

function printLine(cmdText, outputHTML, promptLabel) {
  const promptInner = promptLabel || PROMPT_HTML;
  const cmdDiv = document.createElement('div');
  cmdDiv.className = 'prompt-line';
  cmdDiv.innerHTML = `<span class="prompt">${promptInner}</span><span class="history-cmd">${escapeHtml(cmdText)}</span>`;
  history.appendChild(cmdDiv);

  if (outputHTML !== null && outputHTML !== undefined) {
    printOutput(outputHTML);
  } else {
    scrollToBottom();
  }
}

async function sendContactMessage(data) {
  try {
    const response = await fetch(CONTACT_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: data.name, email: data.email, message: data.message, company: "" }),
    });
    if (!response.ok) throw new Error("request failed");
    printOutput(`message sent — thanks, I'll get back to you.`);
  } catch (err) {
    printOutput(`<span class="dim">something went wrong sending that — try again, or reach out on GitHub.</span>`);
  }
}

async function fetchVisitorCount() {
  try {
    const response = await fetch(VISITOR_COUNTER_API_URL);
    if (!response.ok) throw new Error("request failed");
    const data = await response.json();
    printOutput(`${data.count} unique visitors so far.`);
  } catch (err) {
    printOutput(`<span class="dim">couldn't reach the counter — try again later.</span>`);
  }
}

function runCommand(raw) {
  const cmd = raw.trim();
  if (cmd === "") return;

  if (cmd === "clear") {
    history.innerHTML = "";
    return;
  }

  const fn = commands[cmd.toLowerCase()];
  if (fn) {
    printLine(cmd, fn());
  } else {
    printLine(cmd, `<span class="dim">command not found: ${escapeHtml(cmd)} — type 'help'</span>`);
  }
}

function handleEnter(raw) {
  if (mode === 'name') {
    const val = raw.trim();
    if (val === "") {
      printLine(raw, `<span class="dim">name can't be empty — try again</span>`, "your name >");
      return;
    }
    contactData.name = val;
    printLine(raw, `got it — what's your email, so I can reply?`, "your name >");
    mode = 'email';
    updatePrompt();
    return;
  }

  if (mode === 'email') {
    const val = raw.trim();
    if (!isValidEmail(val)) {
      printLine(raw, `<span class="dim">that doesn't look like a valid email — try again</span>`, "your email >");
      return;
    }
    contactData.email = val;
    printLine(raw, `got it — what's your message?`, "your email >");
    mode = 'message';
    updatePrompt();
    return;
  }

  if (mode === 'message') {
    const val = raw.trim();
    if (val === "") {
      printLine(raw, `<span class="dim">message can't be empty — try again</span>`, "your message >");
      return;
    }
    contactData.message = val;
    printLine(raw, `sending…`, "your message >");
    const toSend = contactData;
    mode = null;
    contactData = {};
    updatePrompt();
    sendContactMessage(toSend);
    return;
  }

  runCommand(raw);
}

// Text entry (typing, backspace, paste, IME, mobile autocomplete) all goes
// through a real <input> so phones/tablets actually show a keyboard - a
// bare div can take focus but never triggers an on-screen keyboard.
hiddenInput.addEventListener('input', () => {
  holdCursorSolid();
  inputBuffer = hiddenInput.value;
  typedText.textContent = inputBuffer;
  scrollToBottom();
});

hiddenInput.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  holdCursorSolid();

  if (e.key === 'Enter') {
    e.preventDefault();
    const wasCommandMode = (mode === null);
    handleEnter(inputBuffer);
    if (wasCommandMode && inputBuffer.trim() !== "") {
      cmdHistory.push(inputBuffer);
      histIndex = cmdHistory.length;
    }
    inputBuffer = "";
    hiddenInput.value = "";
    typedText.textContent = "";
  } else if (e.key === 'ArrowUp') {
    if (histIndex > 0) {
      histIndex--;
      inputBuffer = cmdHistory[histIndex] || "";
      hiddenInput.value = inputBuffer;
      typedText.textContent = inputBuffer;
    }
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    if (histIndex < cmdHistory.length) {
      histIndex++;
      inputBuffer = cmdHistory[histIndex] || "";
      hiddenInput.value = inputBuffer;
      typedText.textContent = inputBuffer;
    }
    e.preventDefault();
  }
  scrollToBottom();
});

function focusInput() {
  hiddenInput.focus();
}

function typeInto(el, str, speed, done) {
  let idx = 0;
  (function step() {
    if (idx <= str.length) {
      el.textContent = str.slice(0, idx);
      idx += 1;
      setTimeout(step, speed);
    } else if (done) setTimeout(done, 400);
  })();
}

function revealPrompt() {
  livePrompt.innerHTML = PROMPT_HTML;
  liveLine.classList.add('visible');
  scrollToBottom();
  focusInput();

  if (location.hash === '#contact') {
    window.history.replaceState(null, '', location.pathname + location.search);
    runCommand('contact');
  }
}

function runBootSequence() {
  screen.classList.add('boot-in');
  setTimeout(() => typeInto(boot, motd, 35, revealPrompt), 650);
}

runBootSequence();

screen.addEventListener('click', focusInput);
screen.addEventListener('touchend', focusInput);
</script>
</body>
</html>
