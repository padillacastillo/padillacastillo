<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Cristian Padilla Castillo</title>
  <meta name="description" content="Get in touch with Cristian Padilla Castillo.">
  <meta property="og:title" content="Contact — Cristian Padilla Castillo">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="wrap">
    <a class="back-link" href="../">&larr; back</a>

    <p class="eyebrow"><span class="prompt">$</span> mail --compose</p>
    <h1>Get in touch</h1>
    <p class="bio">Send a message and I'll reply from my own inbox — nothing here is a mailing list or a bot.</p>

    <form id="contact-form" class="contact-form" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required maxlength="100">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required maxlength="200">
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required maxlength="2000"></textarea>
      </div>

      <!-- Honeypot: hidden from sighted and keyboard/screen-reader users, bots that auto-fill every field will trip it -->
      <div class="field field-trap" aria-hidden="true">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" tabindex="-1" autocomplete="off">
      </div>

      <button type="submit" id="submit-btn" class="submit-btn">Send message</button>
      <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
    </form>
  </main>
  <script src="../js/contact.js"></script>
</body>
</html>
