name: test

on:
  pull_request:
    branches: [master]

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - run: terraform fmt -check -recursive

      # No AWS credentials in PR runs, so this only checks syntax/config -
      # it can't see whether real resources would actually apply cleanly.
      - run: terraform init -backend=false

      - run: terraform validate

  lambda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m py_compile lambda/*.py
